<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- daisy ui cdn  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fontawesome cdn  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body
    class=" bg-[#f1f5f9] max-w-sm flex flex-col mx-auto p-3 items-center justify-center h-screen relative  overflow-hidden"
  >
    <!-- logo container  -->
    <div class="p-5">
      <h1 class="text-white bg-red-500 -tracking-[-5px] p-2 text-center">
        City Touch
      </h1>
      <p class="px-2 text-center">DIGITAL BANKING</p>
    </div>
    <!------------- login form start here -------------- -->
    <section
      id="sign_in_container"
      class="p-5 relative bg-slate-100 rounded-lg shadow-lg"
    >
      <!-- mobile number  -->
      <div class="mt-2">
        <input
          id="mobile_number"
          type="text"
          placeholder="+88"
          class="input my-2 w-full outline-none rounded-full"
        />
        <!-- Password  -->
        <input
          id="password"
          type="password"
          placeholder="Password"
          class="input my-2 w-full outline-none rounded-full"
        />

        <button class="text-[#fa1313]">Forget Password?</button>
      </div>

      <div class="my-5">
        <button
          id="login_btn"
          class="p-2 btn-soft btn-success text-[#ececec] bg-[#ff3d1b] w-full rounded-full"
        >
          Login
        </button>
      </div>

      <div>
        <div class="flex mt-2">
          <p>Don't have an account?</p>
          <button
            id="sign-up_btn"
            class="ml-2 text-[#fc2d22] cursor-pointer border-none"
          >
            Sign Up
          </button>
        </div>
      </div>
    </section>

    <!------------ sign up form start here ---------- -->

    <section
      id="sign_up_container"
      class="p-5 relative bg-slate-100 rounded-lg shadow-lg hidden"
    >
      <div>
        <h1 class="font-bold text-2xl text-center">Create Account</h1>
        <div class="flex mt-2">
          <p>Allready have an account?</p>
        </div>
      </div>

      <div class="mt-2">
        <!-- name input fild  -->
        <input
          id="name"
          type="text"
          placeholder="Name"
          class="input my-2 w-full outline-none rounded-full"
        />
        <!-- email input fild  -->
        <input
          id="email_input"
          type="text"
          placeholder="Email or Phone"
          class="input my-2 w-full outline-none rounded-full"
        />
        <!-- pin input  -->
        <input
          id="pin_number"
          type="text"
          placeholder="Password"
          class="input my-2 w-full outline-none rounded-full"
        />
      </div>

      <div class="my-5">
        <button
          id="signUp-btn"
          class="p-3 btn-soft btn-success text-[#ececec] bg-[#fc3822] w-full rounded-full"
        >
          Sign Up
        </button>
      </div>
    </section>

    <section class="p-3 mt-10">
      <div>
        <ul
          class="flex gap-5 divide-x-2 divide-solid divide-red-500 text-center"
        >
          <li class=   "px-3 cursor-pointer">FaQ</li>
          <li class="px-3 cursor-pointer">ATM & Branch</li>
          <li class="px-3 cursor-pointer">Info</li>
        </ul>
        <ul class="flex divide-x-2 divide-solid divide-red-500 mt-5">
          <li class="px-3 cursor-pointer">Privacy</li>
          <li class="px-3 cursor-pointer">Contact</li>
        </ul>
      </div>
    </section>
    <section class="copy_write absolute bottom-5">
      <p>© 2026 City Touch. All Rights Reserved.</p>
    </section>

   

    <script src="./script/login.js"></script>
  </body>
</html>
